<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Aggregator - Stay Updated</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-container">
      <div class="logo">
        <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"></path>
          <path d="M18 14h-8"></path>
          <path d="M15 18h-5"></path>
          <path d="M10 6h8v4h-8V6Z"></path>
        </svg>
        <span class="logo-text">NewsHub</span>
      </div>
      <div class="header-tagline">Your Daily Dose of Global News</div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container">
    <!-- Controls Section -->
    <section class="controls-section">
      <div class="controls">
        <div class="control-group">
          <label for="category" class="control-label">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
              <polyline points="2 17 12 22 22 17"></polyline>
              <polyline points="2 12 12 17 22 12"></polyline>
            </svg>
            Category
          </label>
          <select id="category" class="select-control">
            <option value="general">📰 General</option>
            <option value="technology">💻 Technology</option>
            <option value="sports">⚽ Sports</option>
            <option value="business">💼 Business</option>
            <option value="entertainment">🎬 Entertainment</option>
            <option value="health">🏥 Health</option>
            <option value="science">🔬 Science</option>
          </select>
        </div>

        <div class="control-group search-group">
          <label for="search" class="control-label">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </svg>
            Search
          </label>
          <div class="search-wrapper">
            <input type="text" id="search" class="search-input" placeholder="Search for news..." />
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </svg>
          </div>
        </div>
      </div>
    </section>

    <!-- Loading Indicator -->
    <div id="loader" class="loader">
      <div class="spinner"></div>
      <p>Loading news...</p>
    </div>

    <!-- News Container -->
    <div id="news-container" class="news-grid"></div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>Powered by News API | Stay informed, stay ahead</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
